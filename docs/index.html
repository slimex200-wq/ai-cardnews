<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Card News Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0a; color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            padding: 40px 20px;
            max-width: 1200px; margin: 0 auto;
        }
        h1 {
            font-size: 48px; font-weight: 900;
            letter-spacing: -2px; margin-bottom: 8px;
        }
        .subtitle {
            color: #666; font-size: 18px; margin-bottom: 60px;
        }
        .date-section {
            margin-bottom: 60px;
        }
        h2 {
            font-size: 24px; font-weight: 600;
            color: #888; margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 1px solid #222;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }
        .card-link {
            display: block;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
            transition: border-color 0.2s;
        }
        .card-link:hover {
            border-color: #555;
        }
        .card-img {
            width: 100%; height: auto; display: block;
        }
        @media (max-width: 768px) {
            .card-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            h1 { font-size: 32px; }
        }
    </style>
</head>
<body>
    <h1>AI Card News</h1>
    <p class="subtitle">매일 자동 생성되는 AI 뉴스 카드</p>
    
        <section class="date-section">
            <h2>2026-03-20</h2>
            <div class="card-grid">
            <a href="../output/2026-03-20/card-01.png" download class="card-link">
                <img src="../output/2026-03-20/card-01.png" alt="card-01.png" class="card-img">
            </a>
            <a href="../output/2026-03-20/card-02.png" download class="card-link">
                <img src="../output/2026-03-20/card-02.png" alt="card-02.png" class="card-img">
            </a>
            <a href="../output/2026-03-20/card-03.png" download class="card-link">
                <img src="../output/2026-03-20/card-03.png" alt="card-03.png" class="card-img">
            </a>
            <a href="../output/2026-03-20/card-04.png" download class="card-link">
                <img src="../output/2026-03-20/card-04.png" alt="card-04.png" class="card-img">
            </a>
            <a href="../output/2026-03-20/card-05.png" download class="card-link">
                <img src="../output/2026-03-20/card-05.png" alt="card-05.png" class="card-img">
            </a>
            <a href="../output/2026-03-20/card-06.png" download class="card-link">
                <img src="../output/2026-03-20/card-06.png" alt="card-06.png" class="card-img">
            </a>
            </div>
        </section>
</body>
</html>
