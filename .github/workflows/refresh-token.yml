name: Refresh Threads Token

on:
  schedule:
    - cron: '0 3 * * 1'  # 매주 월요일 KST 12:00 (UTC 03:00)
  workflow_dispatch:

permissions:
  contents: read

env:
  TZ: Asia/Seoul

jobs:
  refresh:
    name: 토큰 갱신
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Refresh token
        id: refresh
        env:
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
        run: python refresh_token.py

      - name: Update secret
        if: steps.refresh.outputs.new_token
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          echo "${{ steps.refresh.outputs.new_token }}" | gh secret set THREADS_ACCESS_TOKEN -R ${{ github.repository }}
          echo "THREADS_ACCESS_TOKEN 업데이트 완료 (${{ steps.refresh.outputs.expires_days }}일 유효)"

      - name: Notify on failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MSG="⚠ Threads 토큰 갱신 실패. Meta 콘솔에서 수동 재발급 필요."
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d text="${MSG}" > /dev/null
